<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phinix DTrader</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f5f5f5;
}

.header{
    background:#0b4ecf;
    color:white;
    padding:12px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.card{
    background:white;
    margin:10px;
    padding:12px;
    border-radius:12px;
}

.circles{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:15px;
    margin-top:20px;
}

.circle{
    width:65px;
    height:65px;
    border-radius:50%;
    border:5px solid #d9d9d9;
    background:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    margin:auto;
    font-size:22px;
}

.circle small{
    font-size:11px;
    margin-top:2px;
}

.active{
    background:#1e2a8a;
    color:white;
}

.select-digit{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:8px;
    margin-top:25px;
}

.box{
    background:#f2f2f2;
    padding:15px;
    text-align:center;
    border-radius:8px;
    font-size:20px;
}

.box.active{
    background:#d9dce5;
    color:black;
    font-weight:bold;
}

.input{
    background:white;
    border-radius:10px;
    padding:15px;
    margin-top:20px;
    display:flex;
    justify-content:space-between;
    font-size:20px;
}

.trade-buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.trade{
    flex:1;
    color:white;
    border-radius:10px;
    padding:18px;
    text-align:center;
}

.over{
    background:#2ab7b3;
}

.under{
    background:#ef3c3c;
}

.trade h2{
    font-size:28px;
}

.trade p{
    margin-top:10px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="header">
PHINIX DTRADER
</div>

<div class="card">

<div class="circles">

<div class="circle">0<small>11.3%</small></div>
<div class="circle">1<small>10.3%</small></div>
<div class="circle">2<small>10.1%</small></div>
<div class="circle">3<small>10.5%</small></div>
<div class="circle">4<small>9.9%</small></div>

<div class="circle">5<small>9.8%</small></div>
<div class="circle">6<small>7.1%</small></div>

<div class="circle active">
7
<small>10.3%</small>
</div>

<div class="circle">8<small>10.2%</small></div>
<div class="circle">9<small>10.5%</small></div>

</div>

<div class="select-digit">

<div class="box">0</div>
<div class="box">1</div>
<div class="box">2</div>
<div class="box">3</div>
<div class="box">4</div>

<div class="box">5</div>
<div class="box">6</div>
<div class="box active">7</div>
<div class="box">8</div>
<div class="box">9</div>

</div>

<div class="input">
<span>1 Tick</span>
<span>2.00 USD</span>
</div>

<div class="trade-buttons">

<div class="trade over">
<h2>Over</h2>
<p>Payout<br>8.26 USD</p>
</div>

<div class="trade under">
<h2>Under</h2>
<p>Payout<br>2.70 USD</p>
</div>

</div>

</div>

</body>
</html>
