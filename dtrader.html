<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phinix Traders</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#05050b;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    width:100%;
    max-width:430px;
    margin:auto;
    padding:15px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
}

.logo{
    color:#b266ff;
    font-size:20px;
    font-weight:bold;
}

.wallet-box{
    margin-top:20px;
    background:#090913;
    border:1px solid #6b29ff;
    border-radius:25px;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 0 20px rgba(130,50,255,.4);
}

.balance h1{
    font-size:55px;
}

.wallet-btn{
    background:linear-gradient(90deg,#7b2cff,#d06fff);
    padding:18px 22px;
    border-radius:20px;
    font-size:18px;
}

.tabs{
    display:flex;
    gap:12px;
    margin-top:20px;
}

.tab{
    flex:1;
    background:#090913;
    padding:25px;
    border-radius:20px;
    text-align:center;
    border:1px solid #222;
}

.active{
    border:1px solid #b266ff;
    box-shadow:0 0 25px rgba(180,80,255,.5);
    color:#d17cff;
}

.market{
    margin-top:20px;
    background:#090913;
    padding:25px;
    border-radius:25px;
}

.market h2{
    font-size:26px;
}

.price{
    color:#00ff99;
    margin-top:15px;
    font-size:18px;
}

.digits{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:15px;
    margin-top:25px;
}

.circle{
    width:60px;
    height:60px;
    border-radius:50%;
    border:4px solid #333;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    font-size:20px;
}

.selected{
    border-color:#c94fff;
    box-shadow:0 0 20px #c94fff;
}

.option{
    background:#090913;
    padding:22px;
    border-radius:20px;
    margin-top:20px;
    font-size:18px;
}

.buttons{
    display:flex;
    gap:15px;
    margin-top:20px;
}

.over{
    flex:1;
    background:#00695c;
    padding:20px;
    text-align:center;
    border-radius:20px;
}

.under{
    flex:1;
    background:#8b0035;
    padding:20px;
    text-align:center;
    border-radius:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div>☰</div>
<div class="logo">PHINIX TRADERS</div>
<div>🔔</div>
</div>

<div class="wallet-box">
<div class="balance">
Demo Balance
<h1>$10,000</h1>
</div>

<div class="wallet-btn">
Wallet ▼
</div>
</div>

<div class="tabs">
<div class="tab">🤖 Bot Builder</div>
<div class="tab active">📈 Manual Trader</div>
</div>

<div class="market">
<h2>Volatility 100 (1s) Index ▼</h2>
<div class="price">6,719.71 ▲ 0.42%</div>
</div>

<div class="digits">
<div class="circle">0</div>
<div class="circle">1</div>
<div class="circle">2</div>
<div class="circle">3</div>
<div class="circle">4</div>
<div class="circle">5</div>
<div class="circle">6</div>
<div class="circle selected">7</div>
<div class="circle">8</div>
<div class="circle">9</div>
</div>

<div class="option">
Over / Under ▼
</div>

<div class="option">
⏱ 1 Tick
</div>

<div class="option">
💵 Stake: 125 USD
</div>

<div class="buttons">
<div class="over">OVER</div>
<div class="under">UNDER</div>
</div>

</div>

</body>
</html>
