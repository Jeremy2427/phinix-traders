<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phinix Traders</title>

<style>
body{
    margin:0;
    background:#050505;
    color:white;
    font-family:Arial;
}

.header{
    background:black;
    padding:12px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.tabs{
    display:flex;
    overflow:auto;
    background:#000;
}

.tab{
    padding:15px;
    white-space:nowrap;
    font-weight:bold;
}

.active-tab{
    background:#00d9ff;
    color:black;
}

.card{
    background:#111;
    margin:10px;
    padding:15px;
    border-radius:15px;
}

.market{
    font-size:28px;
    font-weight:bold;
}

.circles{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:15px;
    margin-top:20px;
}

.circle{
    width:65px;
    height:65px;
    border-radius:50%;
    border:5px solid #333;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    margin:auto;
}

.active{
    border-color:#5b5bff;
    box-shadow:0 0 20px #5b5bff;
}

.digits{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
    margin-top:20px;
}

.digit{
    background:#111;
    padding:15px;
    border-radius:8px;
    text-align:center;
}

.trade-box{
    background:#111;
    padding:15px;
    border-radius:12px;
    margin-top:20px;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.over{
    flex:1;
    background:#14c8c8;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

.under{
    flex:1;
    background:#e6374a;
    padding:20px;
    border-radius:10px;
    text-align:center;
}
</style>
</head>

<body>

<div class="header">PHINIX TRADERS</div>

<div class="tabs">
    <div class="tab">Bots</div>
    <div class="tab">Analysis</div>
    <div class="tab active-tab">D-Trader</div>
    <div class="tab">Smart Analysis</div>
</div>

<div class="card">
    <div class="market">
        Volatility 75 (1s) Index
    </div>

    <div class="circles">
        <div class="circle">0<br>10%</div>
        <div class="circle">1<br>9%</div>
        <div class="circle">2<br>9%</div>
        <div class="circle">3<br>10%</div>
        <div class="circle">4<br>11%</div>
        <div class="circle">5<br>9%</div>
        <div class="circle">6<br>10%</div>
        <div class="circle active">7<br>10%</div>
        <div class="circle">8<br>11%</div>
        <div class="circle">9<br>10%</div>
    </div>

    <div class="trade-box">
        Over / Under<br>
        Matches / Differs<br>
        Even / Odd
    </div>

    <div class="digits">
        <div class="digit">0</div>
        <div class="digit">1</div>
        <div class="digit">2</div>
        <div class="digit">3</div>
        <div class="digit">4</div>
        <div class="digit">5</div>
        <div class="digit">6</div>
        <div class="digit">7</div>
        <div class="digit">8</div>
        <div class="digit">9</div>
    </div>

    <div style="margin-top:20px;">
        Tick: 1<br><br>
        Stake: 34.00 USD
    </div>

    <div class="buttons">
        <div class="over">
            OVER<br>Payout
        </div>

        <div class="under">
            UNDER<br>Payout
        </div>
    </div>

</div>

</body>
</html>
