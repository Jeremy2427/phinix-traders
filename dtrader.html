<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phinix DTrader</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f2f2f2;
}

.header{
background:#184ec9;
color:white;
text-align:center;
padding:12px;
font-size:22px;
font-weight:bold;
}

.card{
background:white;
margin:8px;
padding:12px;
border-radius:15px;
}

.circles{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-bottom:15px;
}

.circle{
width:55px;
height:55px;
border-radius:50%;
border:4px solid #ddd;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
margin:auto;
background:white;
font-size:16px;
}

.circle small{
font-size:10px;
}

.active{
background:#232c93;
color:white;
}

label{
font-weight:bold;
font-size:14px;
display:block;
margin-top:10px;
margin-bottom:5px;
}

select,input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

.tick-box{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
margin-top:10px;
}

.tick-btn{
width:40px;
height:40px;
border:none;
border-radius:10px;
font-size:22px;
background:#184ec9;
color:white;
}

.tick-value{
font-size:20px;
font-weight:bold;
}

.buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.btn{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
color:white;
}

.over{
background:#2cb8b5;
}

.under{
background:#ef3c3c;
}

.start{
width:100%;
margin-top:12px;
padding:14px;
border:none;
border-radius:12px;
background:#ffd700;
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
PHINIX DTRADER
</div>

<div class="card">

<div class="circles">

<div class="circle">0<small>11%</small></div>
<div class="circle">1<small>10%</small></div>
<div class="circle">2<small>10%</small></div>
<div class="circle">3<small>10%</small></div>
<div class="circle">4<small>10%</small></div>

<div class="circle">5<small>9%</small></div>
<div class="circle">6<small>8%</small></div>
<div class="circle active">7<small>10%</small></div>
<div class="circle">8<small>10%</small></div>
<div class="circle">9<small>10%</small></div>

</div>

<label>Market</label>

<select>
<option>Volatility 10</option>
<option>Volatility 25</option>
<option>Volatility 50</option>
<option>Volatility 75</option>
<option>Volatility 100</option>
</select>

<label>Trade Type</label>

<select>
<option>Over / Under</option>
<option>Even / Odd</option>
<option>Matches / Differs</option>
</select>

<label>Stake</label>

<input type="number" placeholder="Enter stake">

<label>Ticks</label>

<div class="tick-box">
<button class="tick-btn">-</button>
<div class="tick-value">1</div>
<button class="tick-btn">+</button>
</div>

<div class="buttons">

<button class="btn over">
OVER
</button>

<button class="btn under">
UNDER
</button>

</div>

<button class="start">
START TRADING
</button>

</div>

</body>
</html>
