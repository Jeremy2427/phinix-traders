<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phinix DTrader</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial;
    background:#f5f5f5;
}

.header{
    background:#1e2a8a;
    color:white;
    text-align:center;
    padding:10px;
    font-size:18px;
    font-weight:bold;
}

.card{
    background:white;
    margin:5px;
    padding:10px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.section{
    margin-top:12px;
}

h3{
    margin-bottom:8px;
    font-size:15px;
}

.circles{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:8px;
}

.circle{
    width:42px;
    height:42px;
    border:2px solid lightgray;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    font-size:14px;
    background:white;
}

.active{
    background:#1e2a8a;
    color:white;
}

select,input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-top:5px;
}

.buttons{
    display:flex;
    gap:8px;
}

.button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
}

.over{
    background:#20b2aa;
}

.under{
    background:#e53935;
}

.start{
    width:100%;
    padding:12px;
    background:#ffd600;
    border:none;
    border-radius:8px;
    margin-top:12px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
PHINIX DTRADER
</div>

<div class="card">

<div class="section">
<h3>Digit Analysis</h3>

<div class="circles">
<div class="circle">0</div>
<div class="circle">1</div>
<div class="circle">2</div>
<div class="circle">3</div>
<div class="circle">4</div>
<div class="circle">5</div>
<div class="circle">6</div>
<div class="circle active">7</div>
<div class="circle">8</div>
<div class="circle">9</div>
</div>
</div>

<div class="section">
<h3>Market</h3>
<select>
<option>Volatility 100</option>
</select>
</div>

<div class="section">
<h3>Duration</h3>
<select>
<option>1 Tick</option>
</select>
</div>

<div class="section">
<h3>Trade Type</h3>
<p>✔ Over / Under</p>
<p>✔ Matches / Differs</p>
<p>✔ Even / Odd</p>
</div>

<div class="section buttons">
<button class="button over">OVER</button>
<button class="button under">UNDER</button>
</div>

<div class="section">
<h3>Stake</h3>
<input type="number" placeholder="Enter stake">
</div>

<button class="start">Start Trading</button>

</div>

</body>
</html>
