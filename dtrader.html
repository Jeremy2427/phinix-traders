<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phinix Traders</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#05050b;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    width:100%;
    max-width:430px;
    margin:auto;
    padding:12px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
}

.logo{
    color:#b266ff;
    font-size:18px;
    font-weight:bold;
}

.wallet-box{
    margin-top:15px;
    background:#090913;
    border:1px solid #6b29ff;
    border-radius:20px;
    padding:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 0 20px rgba(130,50,255,.3);
}

.balance h1{
    font-size:40px;
}

.wallet-btn{
    background:linear-gradient(90deg,#7b2cff,#d06fff);
    padding:12px 18px;
    border-radius:16px;
}

.tabs{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.tab{
    flex:1;
    background:#090913;
    padding:16px;
    border-radius:18px;
    text-align:center;
    border:1px solid #222;
}

.active{
    border:1px solid #b266ff;
    color:#d17cff;
}

.market{
    margin-top:15px;
    background:#090913;
    padding:15px;
    border-radius:20px;
}

.price{
    color:#00ff99;
    margin-top:10px;
}

.digits{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
    margin-top:15px;
}

.circle-box{
    text-align:center;
}
.circle-box small{
    display:block;
    margin-top:2px;
    color:#00ff99;
    font-size:11px;
}
.circle{
    width:70px;
    height:70px;
    border-radius:50%;
    border:3px solid #333;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    margin:auto;
}

.digit{
    font-size:18px;
    font-weight:bold;
    color:white;
}

.percent{
    font-size:11px;
    color:#00ff99;
    margin-top:2px;
}

.trade-box{
    background:#080814;
    border:1px solid #1a1a2e;
    border-radius:15px;
    padding:18px;
    margin-top:12px;
    color:white;
    font-size:18px;
}


.selected{
    border-color:#c94fff;
    box-shadow:0 0 15px #c94fff;
}

.option{
    background:#090913;
    padding:14px;
    border-radius:16px;
    margin-top:12px;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.over{
    flex:1;
    background:#00695c;
    padding:16px;
    text-align:center;
    border-radius:16px;
}

.under{
    flex:1;
    background:#8b0035;
    padding:16px;
    text-align:center;
    border-radius:16px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div>☰</div>
<div class="logo">PHINIX TRADERS</div>
<div>🔔</div>
</div>

<div class="wallet-box">
<div class="balance">
Demo Balance
<h1>$10,000</h1>
</div>

<div class="wallet-btn">
Wallet ▼
</div>
</div>

<div class="tabs">
<div class="tab">🤖 Bot Builder</div>
<div class="tab active">📈 Manual Trader</div>
</div>

<div class="market">
<h3>Volatility 100 (1s) Index ▼</h3>
<div class="price">
6,719.71 ▲ 0.42%
</div>
</div>

<div class="digits">

  <div class="circle-box">
    <div class="circle">
      <div class="digit">0</div>
      <div class="percent">10%</div>
    </div>
  </div>

  <div class="circle-box">
    <div class="circle">
      <div class="digit">1</div>
      <div class="percent">10%</div>
    </div>
  </div>

  <div class="circle-box">
    <div class="circle">
      <div class="digit">2</div>
      <div class="percent">10%</div>
    </div>
  </div>

  <div class="circle-box">
    <div class="circle">
      <div class="digit">3</div>
      <div class="percent">10%</div>
    </div>
  </div>

  <div class="circle-box">
    <div class="circle">
      <div class="digit">4</div>
      <div class="percent">10%</div>
    </div>
  </div>

  <div class="circle-box">
    <div class="circle">
      <div class="digit">5</div>
      <div class="percent">10%</div>
    </div>
  </div>

  <div class="circle-box">
    <div class="circle">
      <div class="digit">6</div>
      <div class="percent">10%</div>
    </div>
  </div>

  <div class="circle-box">
    <div class="circle">
      <div class="digit">7</div>
      <div class="percent">10%</div>
    </div>
  </div>

  <div class="circle-box">
    <div class="circle">
      <div class="digit">8</div>
      <div class="percent">10%</div>
    </div>
  </div>

  <div class="circle-box">
    <div class="circle">
      <div class="digit">9</div>
      <div class="percent">10%</div>
    </div>
  </div>

</div> 
<div class="trade-box">
    Over / Under ▼
</div>

<div class="trade-box">
    1 Tick ▼
</div>

<div class="trade-box">
    Stake: 125 USD
</div>

<div class="buttons">
    <button class="over">OVER</button>
    <button class="under">UNDER</button>
</div>
