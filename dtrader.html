<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
margin:0;
background:#070707;
font-family:Arial;
color:white;
}

.header{
background:#000;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.market-card{
background:#111;
margin:10px;
padding:15px;
border-radius:15px;
}

select,input{
width:100%;
padding:12px;
background:#111;
color:white;
border:1px solid #333;
border-radius:10px;
font-size:18px;
}

.circles{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-top:20px;
}

.circle{
width:60px;
height:60px;
background:#111;
border:4px solid #333;
border-radius:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
margin:auto;
}

.active{
background:#1d237d;
border-color:#4450ff;
}

.digits{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
margin-top:20px;
}

.digit{
background:#111;
padding:18px;
text-align:center;
border-radius:8px;
}

.trade-box{
background:#111;
padding:15px;
margin-top:20px;
border-radius:12px;
}

.trade-buttons{
display:flex;
gap:10px;
margin-top:20px;
}

.over{
flex:1;
background:#1cc9c9;
padding:20px;
border-radius:12px;
text-align:center;
font-size:25px;
font-weight:bold;
}

.under{
flex:1;
background:#e53935;
padding:20px;
border-radius:12px;
text-align:center;
font-size:25px;
font-weight:bold;
}

.start{
background:#ffd600;
color:black;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
border-radius:12px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="header">
PHINIX TRADERS
</div>

<div class="market-card">

<select>
<option>Volatility 75 (1s) Index</option>
<option>Volatility 50 (1s) Index</option>
<option>Volatility 100 Index</option>
<option>Volatility 25 Index</option>
<option>Volatility 10 Index</option>
<option>Volatility 75 Index</option>
<option>Volatility 50 Index</option>
</select>

<div class="circles">

<div class="circle">0<br>10%</div>
<div class="circle">1<br>9%</div>
<div class="circle">2<br>10%</div>
<div class="circle">3<br>11%</div>
<div class="circle">4<br>10%</div>

<div class="circle">5<br>10%</div>
<div class="circle">6<br>9%</div>
<div class="circle active">7<br>10%</div>
<div class="circle">8<br>11%</div>
<div class="circle">9<br>10%</div>

</div>

<div class="trade-box">

<select>
<option>Over / Under</option>
<option>Matches / Differs</option>
<option>Even / Odd</option>
</select>

<br><br>

<select>
<option>1 Tick</option>
<option>2 Ticks</option>
<option>3 Ticks</option>
<option>5 Ticks</option>
<option>10 Ticks</option>
</select>

<br><br>

<input placeholder="Enter stake">

</div>

<div class="digits">

<div class="digit">0</div>
<div class="digit">1</div>
<div class="digit">2</div>
<div class="digit">3</div>
<div class="digit">4</div>

<div class="digit">5</div>
<div class="digit">6</div>
<div class="digit">7</div>
<div class="digit">8</div>
<div class="digit">9</div>

</div>

<div class="trade-buttons">

<div class="over">
Over
<br><br>
Payout
</div>

<div class="under">
Under
<br><br>
Payout
</div>

</div>

<div class="start">
START TRADING
</div>

</div>

</body>
</html>
