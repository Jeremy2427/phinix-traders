<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phinix Traders</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#05050b;
    font-family:Arial,sans-serif;
    color:white;
    overflow-x:hidden;
}

.container{
    width:100%;
    max-width:430px;
    margin:auto;
    padding:12px;
}

/* Header */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:15px;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    width:45px;
}

.logo-text{
    font-size:24px;
    font-weight:bold;
    color:#b266ff;
}

/* Wallet */
.wallet-box{
    margin-top:20px;
    border:1px solid #6b29ff;
    border-radius:18px;
    padding:15px;
    background:#090913;
    box-shadow:0 0 20px rgba(130,50,255,.4);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.balance{
    font-size:16px;
}

.balance h1{
    font-size:40px;
}

.wallet-btn{
    background:linear-gradient(90deg,#7b2cff,#d07bff);
    padding:15px 20px;
    border-radius:16px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">

        ☰

        <div class="logo">
            <div class="logo-text">
                PHINIX TRADERS
            </div>
        </div>

        🔔

    </div>

    <div class="wallet-box">

        <div class="balance">
            Demo Balance
            <h1>$10,000</h1>
        </div>

        <div class="wallet-btn">
            Wallet ▼
        </div>

    </div>

</div>

</body>
</html>
