<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phinix DTrader</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial, sans-serif;
    background:#f3f5f9;
}

.header{
    background:#1e2a8a;
    color:white;
    text-align:center;
    padding:8px;
    font-size:18px;
    font-weight:bold;
}

.card{
    background:white;
    margin:4px;
    padding:8px;
    border-radius:12px;
}

h3{
    font-size:14px;
    margin:6px 0;
}

.circles{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:5px;
    margin-bottom:10px;
}

.circle{
    width:40px;
    height:40px;
    border:2px solid #d0d0d0;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    font-size:13px;
}

.active{
    background:#1e2a8a;
    color:white;
}

select,input{
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:13px;
    margin-bottom:8px;
}

.trade-buttons{
    display:flex;
    gap:6px;
}

.button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    color:white;
    font-size:13px;
    font-weight:bold;
}

.over{
    background:#20b2aa;
}

.under{
    background:#e53935;
}

.start{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#ffd700;
    font-weight:bold;
    margin-top:8px;
}
</style>
</head>

<body>

<div class="header">
PHINIX DTRADER
</div>

<div class="card">

<h3>Digit Analysis</h3>

<div class="circles">
<div class="circle">0</div>
<div class="circle">1</div>
<div class="circle">2</div>
<div class="circle">3</div>
<div class="circle">4</div>
<div class="circle">5</div>
<div class="circle">6</div>
<div class="circle active">7</div>
<div class="circle">8</div>
<div class="circle">9</div>
</div>

<h3>Market</h3>
<select>
<option>Volatility 100</option>
</select>

<h3>Duration</h3>
<select>
<option>1 Tick</option>
<option>2 Ticks</option>
<option>5 Ticks</option>
</select>

<h3>Stake</h3>
<input type="number" placeholder="Enter stake">

<div class="trade-buttons">
<button class="button over">OVER</button>
<button class="button under">UNDER</button>
</div>

<button class="start">
START
