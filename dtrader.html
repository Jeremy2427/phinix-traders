<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phinix Traders</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#05050b;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    width:100%;
    max-width:430px;
    margin:auto;
    padding:12px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:15px;
}

.logo{
    color:#b266ff;
    font-size:18px;
    font-weight:bold;
}

.wallet-box{
    margin-top:20px;
    background:#090913;
    border:1px solid #6b29ff;
    border-radius:22px;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 0 20px rgba(130,50,255,.4);
}

.wallet-btn{
    background:linear-gradient(90deg,#7b2cff,#d06cff);
    padding:15px 22px;
    border-radius:18px;
}

.tabs{
    display:flex;
    gap:12px;
    margin-top:15px;
}

.tab{
    flex:1;
    background:#090913;
    border:1px solid #222;
    border-radius:18px;
    padding:18px;
    text-align:center;
}

.active{
    box-shadow:0 0 25px rgba(180,50,255,.6);
    color:#d06cff;
}

.market{
    margin-top:15px;
    background:#090913;
    border-radius:22px;
    padding:10px;
}

.digits{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:15px;
    margin-top:15px;
}

.circle{
    width:50px;
    height:50px;
    border-radius:50%;
    border:4px solid #333;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
}

.selected{
    border-color:#c04fff;
    box-shadow:0 0 20px #c04fff;
}

.box{
    margin-top:25px;
    background:#090913;
    border-radius:18px;
    padding:12px;
}

.bottom{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:black;
    padding:12px;
    text-align:center;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div>☰</div>
<div class="logo">PHINIX TRADERS</div>
<div>🔔</div>
</div>

<div class="wallet-box">
<div>
Demo Balance
<h1>$10,000</h1>
</div>

<div class="wallet-btn">
Wallet ▼
</div>
</div>

<div class="tabs">
<div class="tab">🤖 Bot Builder</div>
<div class="tab active">📈 Manual Trader</div>
</div>

<div class="market">
<h2>Volatility 100 (1s) Index ▼</h2>

<br>

<div style="color:#00ff99;">
6,719.71 ▲ 0.42%
</div>
</div>

<div class="digits">

<div class="circle">0</div>
<div class="circle">1</div>
<div class="circle">2</div>
<div class="circle">3</div>
<div class="circle">4</div>

<div class="circle">5</div>
<div class="circle">6</div>
<div class="circle selected">7</div>
<div class="circle">8</div>
<div class="circle">9</div>

</div>

<div class="box">
Over / Under ▼
</div>

<div class="box">
⏱ 1 Tick
</div>

<div class="box">
💵 Stake: 125 USD
</div>

<div style="
display:flex;
gap:12px;
margin-top:20px;
">

<div style="
flex:1;
background:#003c33;
padding:20px;
border-radius:18px;
text-align:center;">
OVER
</div>

<div style="
flex:1;
background:#420018;
padding:20px;
border-radius:18px;
text-align:center;">
UNDER
</div>

</div>

<div class="box">
Recent Trades → View All
</div>

</div>

<div class="bottom">
🏠 Home 📊 Trade 🕒 History 💳 Wallet 👤 Profile
</div>

</body>
</html>
