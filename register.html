<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Phinix Traders</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b0b0b;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1b1b1b;
padding:30px;
border-radius:12px;
width:90%;
max-width:400px;
}

h1{
color:#FFD700;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#FFD700;
border:none;
font-size:18px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

p{
text-align:center;
margin-top:15px;
}

a{
color:#FFD700;
text-decoration:none;
}
</style>

</head>

<body>

<div class="box">

<h1>Create Account</h1>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email Address">

<input type="password" placeholder="Password">

<button>Create Account</button>

<p>Already have an account?
<a href="login.html">Login</a></p>

</div>

</body>
</html>
