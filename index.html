<!DOCTYPE html>

<style>

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;

}

.logo{
font-size:28px;

}

nav a{

.hero{
text-align:center;
padding:80px 20px;

.hero h1{
