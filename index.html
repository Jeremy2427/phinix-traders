<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phinix Traders</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f2f2f2;
}

.topbar{
    background:#0d2d89;
    padding:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:white;
    font-size:20px;
    font-weight:bold;
}

.buttons button{
    background:#4c6fff;
    color:white;
    border:none;
    padding:8px 12px;
    margin-left:5px;
    border-radius:5px;
}

.menu{
    background:#173caa;
    overflow-x:auto;
    white-space:nowrap;
    padding:10px;
}

.menu a{
    color:white;
    text-decoration:none;
    margin-right:20px;
    font-size:16px;
}

.card{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.title{
    background:#173caa;
    color:white;
    padding:10px;
    border-radius:8px;
    font-size:20px;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo">PHINIX TRADERS</div>

    <div class="buttons">
        <button>Deposit</button>
        <button>Log in</button>
        <button>Sign up</button>
    </div>
</div>

<div class="menu">
    <a href="#">Copy Trading</a>
    <a href="#">DTrader</a>
    <a href="#">TradingView</a>
    <a href="#">Bulk Trader</a>
    <a href="#">Bot Editor</a>
    <a href="#">Analysis Tool</a>
    <a href="#">Risk Calculator</a>
    <a href="#">Free Bots</a>
</div>

<div class="card">
    <div class="title">Quick Strategy</div>

    <br>

    <h3>1. Trade Parameters</h3>

    <p>Market: Derived</p>
    <p>Index: Volatility 100</p>
    <p>Trade Type: Over/Under</p>
    <p>Contract Type: Both</p>
    <p>Candle Interval: 1 Minute</p>

    <button style="
    background:gold;
    border:none;
    padding:12px;
    border-radius:8px;">
    Start Trading
    </button>
</div>

</body>
</html>
